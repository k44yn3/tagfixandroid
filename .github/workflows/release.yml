name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: tagfix-linux.zip
            build_path: build/linux/x64/release/bundle
          - os: windows-latest
            target: windows
            artifact_name: tagfix-windows.zip
            build_path: build/windows/runner/Release
          - os: macos-latest
            target: macos
            artifact_name: tagfix-macos.zip
            build_path: build/macos/Build/Products/Release/tagfix.app

    steps:
    
      - uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Download FFmpeg binaries
        run: |
          chmod +x flutter_app/download_ffmpeg.sh
          ./flutter_app/download_ffmpeg.sh

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build ${{ matrix.target }} release
        working-directory: flutter_app
        run: flutter build ${{ matrix.target }} --release

      - name: Package ${{ matrix.target }} build
        working-directory: flutter_app
        run: |
          case "${{ matrix.target }}" in
            linux)
              cd ${{ matrix.build_path }}
              zip -r ../../../../${{ matrix.artifact_name }} .
              ;;
            windows)
              # PowerShell is the default shell on windows‑latest runners
              Compress-Archive -Path ${{ matrix.build_path }}\* -DestinationPath ${{ matrix.artifact_name }}
              ;;
            macos)
              cd ${{ matrix.build_path }}
              zip -r ../../../../${{ matrix.artifact_name }} tagfix.app
              ;;
          esac

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: flutter_app/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/zip
