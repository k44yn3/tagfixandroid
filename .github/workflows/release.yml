name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for all platforms
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: tagfix-linux.zip
            build_path: build/linux/x64/release/bundle

          - os: windows-latest
            target: windows
            artifact_name: tagfix-windows.zip
            build_path: build/windows/runner/Release

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.2

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Download FFmpeg binaries
        run: |
          chmod +x flutter_app/download_ffmpeg.sh
          ./flutter_app/download_ffmpeg.sh

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build ${{ matrix.target }} release
        working-directory: flutter_app
        run: flutter build ${{ matrix.target }} --release

      - name: Package build
        working-directory: flutter_app
        run: |
          case "${{ matrix.target }}" in
            linux)
              cd ${{ matrix.build_path }}
              zip -r ../../../../${{ matrix.artifact_name }} .
              ;;
            windows)
              Compress-Archive -Path ${{ matrix.build_path }}\* -DestinationPath ${{ matrix.artifact_name }}
              ;;
          esac

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: flutter_app/${{ matrix.artifact_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts from all jobs
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "TagFix ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: releases/tagfix-linux.zip/tagfix-linux.zip
          asset_name: tagfix-linux.zip
          asset_content_type: application/zip

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: releases/tagfix-windows.zip/tagfix-windows.zip
          asset_name: tagfix-windows.zip
          asset_content_type: application/zip
